version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - db_data:/var/lib/postgresql/data  
    ports:
      - "5432:5432"
    networks:
      - appnet

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - appnet

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    environment:
      PORT: 3001 
      DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres
    command: sh -c "npm install && npm run start:dev"
    depends_on:
      - db
    networks:
      - appnet


volumes:
  db_data:  

networks:
  appnet: